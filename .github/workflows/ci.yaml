name: CI

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  check:
    name: Nix Flake Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Nix Flake Check
        run: |
          nix flake check --show-trace

  build:
    name: Build with nix-fast-build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Install nix-fast-build
        run: |
          nix profile install nixpkgs#nix-fast-build

      - name: Build all outputs
        run: |
          nix-fast-build --skip-cached --no-nom

  deploy:
    name: Deploy to GHCR
    runs-on: ubuntu-latest
    needs: [check, build]
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Build Container
        run: |
          nix build .#container

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Determine Tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Push to GHCR
        run: |
          # Load and push the image
          nix run .#pushToRegistry ghcr.io/adamcik/plan ${{ steps.tag.outputs.tag }}
